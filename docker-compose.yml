# One image build (codebase setup only: see Dockerfile). Runtime:
#   - redis
#   - web: Gunicorn (queues PDF work to Celery when ACCESSDOC_USE_CELERY=true)
#   - worker: Celery worker only (ACCESSDOC_CONTAINER_ROLE=worker — no HTTP server)

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-use-env-file}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,web}
      ACCESSDOC_REPO_ROOT: /app
      ACCESSDOC_CONTAINER_ROLE: web
      ACCESSDOC_USE_CELERY: "true"
      ACCESSDOC_SQLITE_DIR: /app/backend/data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DOCUSAURUS_BASE_URL: ${DOCUSAURUS_BASE_URL:-/viewer/}
      SKIP_DEFAULT_SUPERUSER: ${SKIP_DEFAULT_SUPERUSER:-0}
    volumes:
      - backend_data:/app/backend/data
      - backend_media:/app/backend/media
      - doc_builds:/app/backend/templates/doc_builds
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-use-env-file}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      ACCESSDOC_REPO_ROOT: /app
      ACCESSDOC_CONTAINER_ROLE: worker
      ACCESSDOC_USE_CELERY: "true"
      ACCESSDOC_SQLITE_DIR: /app/backend/data
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DOCUSAURUS_BASE_URL: ${DOCUSAURUS_BASE_URL:-/viewer/}
    volumes:
      - backend_data:/app/backend/data
      - backend_media:/app/backend/media
      - doc_builds:/app/backend/templates/doc_builds
    depends_on:
      redis:
        condition: service_healthy

volumes:
  backend_data:
  backend_media:
  doc_builds:
